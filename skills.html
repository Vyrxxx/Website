<!DOCTYPE html>
<html>
<head>
<title>Vyrx | Portfolio</title>
<style>
    body {
        overflow-y: auto;
        font-family: "Inter", sans-serif;
        margin: 20px;
        background: radial-gradient(circle at top, #07090f, #1a1f34);
        color: #FFFFFF;
    }

    a {
        color: #FFFFFF;
        text-decoration: none;
    }

    @media (max-width: 800px) {
        .Html {
            width: 70%;
            padding: 30px;
        }

        .Music {
            width: 30%;
            min-width: 300px;
        }

        h3 {
            font-size: 14px;
        }

        p {
            font-size: 12px;
        }
    }

    .P1,
    .P2 {
        width: 80%;
    }

    .Title {
        top: 14px;
        left: 10px;
        text-align: left;
        position: fixed;
        z-index: 2;
    }

    .Bar {
        position: fixed;
        background-color: rgba(0, 0, 0, 0.5);
        width: 100%;
        height: 40px;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
    }

    .Background {
        position: fixed;
        align-items: center;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: -2;
    }

    .Web {
        margin: 100px auto 0;
        align-items: center;
        display: flex;
        flex-direction: column;
        text-align: center;
        background-color: #0b0f1a;
        padding-bottom: 100px;
        padding-top: 10px;
        width: 40%;
        border-radius: 100px;
        max-width: 600px;
        min-width: 250px;
        border: #FFFFFF;
        box-shadow: 10px 10px 10px #0c0332;
    }

    .Ht1,
    .Cs2,
    .Js3,
    .Py1 {
        margin: 20px auto 0;
        border-radius: 10px;
        background-color: #1a1f2e;
        width: 57%;
        height: 6px;
    }

    .Ht1-middle {
        display: block;
        border-radius: 10px;
        width: 75%;
        height: 100%;
        text-align: center;
        background-color: #4f7cff;
    }

    .Cs2-middle {
        display: block;
        border-radius: 10px;
        width: 60%;
        height: 100%;
        text-align: center;
        background-color: #4f7cff;
    }

    .Js3-middle {
        display: block;
        border-radius: 10px;
        width: 0%;
        height: 100%;
        text-align: center;
        background-color: #4f7cff;
    }

    .Python {
        margin: 150px auto 0;
        align-items: center;
        display: flex;
        flex-direction: column;
        text-align: center;
        background-color: #0b0f1a;
        padding-bottom: 100px;
        padding-top: 10px;
        width: 40%;
        max-width: 600px;
        min-width: 250px;
        border-radius: 60px;
        border: #FFFFFF;
        box-shadow: 10px 10px 10px #0c0332;
    }

    .Py1-middle {
        display: block;
        border-radius: 10px;
        width: 30%;
        height: 100%;
        text-align: center;
        background-color: #4f7cff;
    }

    .Pages {
        word-spacing: 5px;
        top: 12px;
        right: 10px;
        text-align: right;
        position: fixed;
        z-index: 2;
    }

    .Pages a {
        font-size: 16px;
        transition: color 0.3s ease;
    }

    .Pages a:hover {
        color: #7a1bb1;
    }

    .Music {
        position: fixed;
        top: 90%;
    }
</style>
</head>
<body>
    <a class="Title" href="index.html">Vyrx.info</a>
    <div class="Bar"></div>
    <div class="Pages">
        <a href="skills.html">Skills</a>
        <a href="index.html">Home</a>
    </div>

    <div class="Web">
        <h3>Web Development</h3>
        <p>Html progress</p>
        <div class="Ht1">
            <div class="Ht1-middle"></div>
        </div>
        <p>Css progress</p>
        <div class="Cs2">
            <div class="Cs2-middle"></div>
        </div>
        <p>Js progress</p>
        <div class="Js3">
            <div class="Js3-middle"></div>
        </div>
    </div>

    <div class="Python">
        <h3>Python development</h3>
        <p>Python progress</p>
        <div class="Py1">
            <div class="Py1-middle"></div>
        </div>
    </div>

    <video autoplay muted loop class="Background" id="myVideo">
        <source src="cutteryt.mp4" type="video/mp4">
    </video>

    <audio class="Music" loop controls autoplay>
        <source src="_official__celeste_original_soundtrack___02___first_steps.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
